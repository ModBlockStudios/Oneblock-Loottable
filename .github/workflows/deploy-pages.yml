name: Deploy to GitHub Pages

# Déploie le site statique sur GitHub Pages.
# Source à sélectionner dans Settings > Pages > "GitHub Actions".
on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution de déploiement à la fois
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # On publie tout le dépôt (site statique servi à la racine)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
